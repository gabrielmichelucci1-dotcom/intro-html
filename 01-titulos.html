<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>conhecendo Tags de Titulo</title>
</head>
<body>
    <!--temos  niveis de titulo do h1 ao h6-->
    <!-- <h1> - representa a abertura da tag -->
        <!--</h1> representa o fechamento da tag -->
<!-- o ideal é usar apenas um h1 por página -->
        <h1> este é um titulo de nivel 1</h1>
        <h2> este é um titulo de nivel 2</h2>
        <h3> este é um titulo de nivel 3</h3>
        <h4> este é um titulo de nivel 4</h4>
        <h5> este é um titulo de nivel 5</h5>
        <h6> este é um titulo de nivel 6</h6>
        

</body> 
</html>

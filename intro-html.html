<!DOCTYPE html>  <!-- serve para garantir que o navegador interprete o código corretamente da versão atual do html, que é a versão 5 -->
<html lang="pt-br">    <!-- especifica o idioma do documento -->
<head>  <!-- seção de meta-informações do documento -->
    <meta charset="UTF-8"> <!-- especifica o conjunto de caracteres utilizado -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- especifica a visualização do documento em dispositivos móveis -->
   
    <title>Document</title> <!-- serve para definir o título do da aba no navegador -->
</head>

<body>
      <!--body/corpo é a aprte do HTML visível do site-->
</body>
</html>

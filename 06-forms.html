<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trabalhando com Formulários</title>
</head>

<body>
<h1>Conhecendo os Formulários</h1>
<hr>
<h2> FORM</h2>
<p> no html, a tag <code> &lt;form&gt;</code> é utilizada para criar formulários.</p>
<form action="">
<input type="text" placeholder="manda teu nome ai fiot">
<br>
    <input type="password" placeholder="Digita a porra da tua senha ">
    <br>
    <label for="email">Email:</label>
    <input type="email" id="email" name="email" placeholder="Digita essa merda de email"> 
   <button type="reset">Envia essa porra logo</button>
<hr>
<h2> Faça Login</h2>
<form>
    <label for="username">Username:</label>
    <input type="email" placeholder="seu@email.com" id="email" required minlength="6"><br>
    <label for="password">Password:</label><br>
    <input type="password" placeholder="digita a senha ai fiot" id="login-password" required minlength="6"><br>
    <button type="submit">Login</button>
</form>
<hr>
<h2> CADASTRE-SE</h2>
<form>
    <label for="name"> Nome</label><br>
    <input type="text" placeholder="EX: Giovanna Banana"  id="name" required minlength="6"> <br>

    <label for="email-cadastro">Email</label><br>
    <input type="email" placeholder="seu@email.com"  id="email-cadastro"required minlength="6"><br>

    <label for="password-cadastro">Password</label><br>
    <input type="password" placeholder="digita a senha" id="password-cadastro" required minlength="6"> <br>
    <button type="submit">Cadastrar</button>
    <label>
        <input type="checkbox" id="terms" name="terms" required>
        Li e aceito os termos de uso e privacidade
        </label>
        </form>
<hr>
<h2> testando outros recursos do formulário</h2>
</form>
<input type="radio" id="html" name="language" value="html">
    <label for="html">HTML</label>
    <input type="radio" id="css" name="language" value="css">
    <label for="css">CSS</label>
    <input type="radio" id="javascript" name="language" value="javascript">
    <label for="javascript">JavaScript</label>
    <input type="date" id="birthday" name="birthday">
    <label for="birthday">Data de Nascimento</label>

</form>

    </body>

</html>
